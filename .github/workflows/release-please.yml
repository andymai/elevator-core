name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release-created: ${{ steps.release.outputs['crates/elevator-core--release_created'] }}
    steps:
      # Mint the App token first so release-please-action creates its
      # PR using the App identity (release-kun). PRs created via the
      # default GITHUB_TOKEN do NOT trigger downstream workflows
      # (GitHub anti-loop protection), so without this the release
      # PR would never see CI / branch-protection checks fire.
      - name: Mint release-kun App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.RELEASE_KUN_APP_ID }}
          private-key: ${{ secrets.RELEASE_KUN_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4.4.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ steps.app-token.outputs.token }}

      # Auto-approve and auto-merge are TEMPORARILY DISABLED during the
      # API ergonomics overhaul stack. During the overhaul, every merge
      # to main would otherwise produce a separate release (and a
      # `SnapshotVersion` break for downstream consumers). With these
      # steps disabled, release-please still opens/updates the release
      # PR on every push — but the PR accumulates all stack commits
      # into a single release. Manually approve and merge the release
      # PR once the overhaul lands.
      #
      # TO RESTORE (final step of the overhaul): uncomment both steps
      # below.
      #
      # - name: Auto-approve release PR
      #   if: steps.release.outputs.pr
      #   env:
      #     GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #   run: |
      #     gh pr review ${{ fromJSON(steps.release.outputs.pr).number }} \
      #       --approve \
      #       --body "Auto-approved by release pipeline." \
      #       --repo ${{ github.repository }}
      #
      # - name: Auto-merge release PR
      #   if: steps.release.outputs.pr
      #   env:
      #     GH_TOKEN: ${{ steps.app-token.outputs.token }}
      #   run: |
      #     gh pr merge ${{ fromJSON(steps.release.outputs.pr).number }} \
      #       --auto --squash \
      #       --repo ${{ github.repository }}

  publish:
    needs: release-please
    if: needs.release-please.outputs.release-created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish elevator-core to crates.io
        run: cargo publish -p elevator-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
