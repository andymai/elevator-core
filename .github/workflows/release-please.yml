name: Release Please

on:
  push:
    branches: [main]
  # Manual recovery path. `release-please-action` creates the GitHub
  # release/tag BEFORE downstream jobs run, so a mid-step crash can
  # leave a version tagged but never published. (Concrete history:
  # `elevator-core-v20.16.0` was minted on 2026-05-18 but the
  # env-block fromJSON template error — fixed in #863 — aborted the
  # workflow before `publish` could fire.) Dispatching this workflow
  # with `recover_tag` re-runs `publish` for that existing tag using
  # the same OIDC trusted-publisher identity as the automated flow.
  # release-please itself is skipped on this trigger.
  workflow_dispatch:
    inputs:
      recover_tag:
        description: "Tag to re-publish (e.g. elevator-core-v20.16.0). Skips release-please."
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-please:
    # Skipped on workflow_dispatch — that trigger is the manual
    # recovery path, which goes straight to `publish` for an existing
    # tag without re-running release management.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release-created: ${{ steps.release.outputs['crates/elevator-core--release_created'] }}
      ffi-release-created: ${{ steps.release.outputs['crates/elevator-ffi--release_created'] }}
      ffi-tag-name: ${{ steps.release.outputs['crates/elevator-ffi--tag_name'] }}
      ffi-version: ${{ steps.release.outputs['crates/elevator-ffi--version'] }}
    steps:
      # Mint the App token first so release-please-action creates its
      # PR using the App identity (release-kun). PRs created via the
      # default GITHUB_TOKEN do NOT trigger downstream workflows
      # (GitHub anti-loop protection), so without this the release
      # PR would never see CI / branch-protection checks fire.
      - name: Mint release-kun App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.RELEASE_KUN_APP_ID }}
          private-key: ${{ secrets.RELEASE_KUN_APP_PRIVATE_KEY }}

      # Skip release-please when no package has shipping changes
      # since its last release tag. "Shipping" excludes tests under
      # src/tests/ or tests/, benches/, CHANGELOG.md, and the version
      # line in Cargo.toml — all of which release-please-action
      # otherwise treats as release-worthy when paired with a `feat:`
      # or `fix:` squash subject.
      #
      # Bounded scope: this guard only catches the case where EVERY
      # package's diff is non-shipping. Mixed PRs (real source
      # changes in package B + test-only changes in package A) still
      # bump A as collateral, because release-please-action v4 reads
      # its config from the GitHub API and there's no per-package
      # opt-out at config-file edit time. That case is handled by
      # commit-scope discipline; see CLAUDE.md.
      #
      # Background: `elevator-core 20.3.0` was published from PR #797
      # — a playground PR that incidentally added a one-line test in
      # `crates/elevator-core/src/tests/`. The release was yanked
      # (#800 reverted). This guard prevents the fully-no-op variant
      # of that scenario.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect shipping changes
        id: ship-check
        run: |
          any_shipping=false
          for pkg_path in $(jq -r '.packages | keys[]' release-please-config.json); do
            pkg=$(basename "$pkg_path")
            version=$(jq -r --arg key "$pkg_path" '.[$key]' .release-please-manifest.json)
            tag="${pkg}-v${version}"
            if ! git rev-parse "$tag" >/dev/null 2>&1; then
              echo "tag $tag missing — assuming $pkg has shipping changes"
              any_shipping=true
              continue
            fi
            # `|| true` neutralises grep's exit-1-on-no-match — without
            # it, a fully-non-shipping diff (the case the guard exists
            # to catch) crashes under bash's `-eo pipefail` before
            # `any_shipping` gets written to $GITHUB_OUTPUT.
            shipping=$(git diff --name-only "$tag"..HEAD -- "$pkg_path/" \
              | { grep -Ev "^$pkg_path/(src/tests/|tests/|benches/|CHANGELOG\.md\$|Cargo\.toml\$)" || true; } \
              | wc -l)
            echo "$pkg: $shipping shipping file(s) since $tag"
            [ "$shipping" -gt 0 ] && any_shipping=true
          done
          echo "any_shipping=$any_shipping" >> "$GITHUB_OUTPUT"
          if [ "$any_shipping" = "false" ]; then
            echo "::notice::Skipping release-please: no shipping changes since last release across any tracked package."
          fi

      - uses: googleapis/release-please-action@v4.4.0
        id: release
        if: steps.ship-check.outputs.any_shipping == 'true'
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ steps.app-token.outputs.token }}

      # release-please-action only edits each tracked crate's
      # `version = "..."` line in Cargo.toml; it never runs cargo, so
      # the workspace Cargo.lock keeps the OLD versions. The next
      # non-release PR then inherits the drift — its pre-commit hook's
      # `cargo metadata --frozen` guard rejects any subsequent
      # Cargo.toml edit until someone refreshes the lock manually.
      # Refresh it here, on the release PR branch, so the lock lands
      # together with the version bumps it describes. `--offline`
      # forbids registry access — the only deltas are the workspace
      # version lines, which don't need network resolution.
      - name: Install Rust toolchain (for Cargo.lock refresh)
        if: steps.release.outputs.pr
        uses: dtolnay/rust-toolchain@stable

      - name: Refresh Cargo.lock on release PR
        if: steps.release.outputs.pr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          # Short-circuit: env-block expressions resolve at step-prep, not
          # at step-run, so when `steps.release.outputs.pr` is empty
          # (release-please opened no PR), `fromJSON('')` would crash the
          # workflow before `if:` could skip the step. The `&& ... || ''`
          # guard yields an empty string in that case; `if:` then skips.
          PR_NUMBER: ${{ steps.release.outputs.pr && fromJSON(steps.release.outputs.pr).number || '' }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          pr_branch=$(gh pr view "$PR_NUMBER" \
            --repo "$REPO" \
            --json headRefName --jq .headRefName)

          git fetch origin "$pr_branch"
          git checkout "$pr_branch"

          cargo update --workspace --offline

          if git diff --quiet Cargo.lock; then
            echo "::notice::Cargo.lock is already in sync; no refresh needed."
            exit 0
          fi

          # Attribute the commit to the App that owns the PR. The
          # default `actions/checkout` step set the credential helper
          # to GITHUB_TOKEN; a bare `git push origin …` would inherit
          # that and GitHub would silently suppress the CI re-trigger
          # (anti-loop protection for pushes by GITHUB_TOKEN). Push
          # explicitly via the App token URL so CI on the PR re-runs
          # against the refreshed lock. This still does NOT re-trigger
          # this release-please workflow — its trigger is
          # `push: branches: [main]`, and we're pushing to the PR
          # branch.
          git config user.name "release-kun[bot]"
          git config user.email "release-kun[bot]@users.noreply.github.com"
          git add Cargo.lock
          git commit -m "chore: refresh Cargo.lock for release"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" "HEAD:${pr_branch}"

      # Inline approve + auto-merge in the same workflow run that
      # opened the PR. Approval uses the default GITHUB_TOKEN
      # (`github-actions[bot]` actor), which is distinct from the App
      # that authored the PR — GitHub forbids self-review, so the two
      # actors must differ. The merge call uses the App token so
      # branch-protection rules requiring a PR approval are satisfied.
      - name: Auto-approve release PR
        if: steps.release.outputs.pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review ${{ fromJSON(steps.release.outputs.pr).number }} \
            --approve \
            --body "Auto-approved by release pipeline." \
            --repo ${{ github.repository }}

      - name: Auto-merge release PR
        if: steps.release.outputs.pr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr merge ${{ fromJSON(steps.release.outputs.pr).number }} \
            --auto --squash \
            --repo ${{ github.repository }}

  publish:
    needs: release-please
    # Two entry points: the normal push-triggered flow runs when
    # release-please cut a new elevator-core release; the manual
    # recovery flow runs when an operator dispatched the workflow
    # with a `recover_tag` that names an elevator-core release tag.
    # `always()` is required so this job doesn't auto-skip when its
    # `needs:` dependency (release-please) was skipped — which is
    # exactly what happens on the workflow_dispatch path.
    if: |
      always() && (
        (github.event_name == 'push' && needs.release-please.outputs.release-created == 'true') ||
        (github.event_name == 'workflow_dispatch' && startsWith(inputs.recover_tag, 'elevator-core-v'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: crates-io
    steps:
      # On workflow_dispatch, check out the tag explicitly so the
      # published artefact matches what was tagged even if main has
      # advanced since. On push, default checkout (HEAD of the
      # triggering ref) is correct because release-please's PR is the
      # tip of main when this job fires.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.recover_tag || '' }}
      - name: Verify Cargo.toml version matches recover_tag
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG: ${{ inputs.recover_tag }}
        run: |
          set -euo pipefail
          # Tag form: elevator-core-vX.Y.Z → expected Cargo.toml version X.Y.Z.
          # Reject anything else early — a malformed tag would have failed
          # at checkout, but this also catches a real tag whose Cargo.toml
          # somehow disagrees with the tag name.
          if [[ ! "$TAG" =~ ^elevator-core-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::recover_tag must match 'elevator-core-vMAJOR.MINOR.PATCH' (got: $TAG)"
            exit 1
          fi
          expected="${TAG#elevator-core-v}"
          line=$(grep -E '^version = "' crates/elevator-core/Cargo.toml | head -1)
          # `version = "X.Y.Z" # comment` → strip up to and including the
          # first quote, then strip from the next quote to the end.
          actual="${line#*\"}"
          actual="${actual%%\"*}"
          if [[ "$expected" != "$actual" ]]; then
            echo "::error::tag $TAG checked out Cargo.toml version $actual; refusing to publish"
            exit 1
          fi
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish elevator-core to crates.io
        run: cargo publish -p elevator-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # ── GameMaker Studio 2 extension bundle ──────────────────────────
  # Triggers on every elevator-ffi release. Builds the cdylib on each
  # target platform, then a final job downloads all three artefacts,
  # assembles examples/gms2-extension/ with the right binaries +
  # LICENSE files, zips the bundle, and uploads it to the GitHub
  # release as elevator_ffi_gms2-<version>.zip.
  #
  # Why rebuild instead of reusing ffi-harness artefacts: cross-job
  # artefact handoff requires explicit upload-artifact wiring and
  # short retention (1 day default), and ffi-harness might not have
  # run on the tagged SHA at all if the release was cut off-cycle.
  # Rebuild is ~30 s per platform warm with rust-cache.
  package-gms-binaries:
    needs: release-please
    if: needs.release-please.outputs.ffi-release-created == 'true'
    # Job-level override: this job only needs read access to check
    # out the tagged ref and write back via upload-artifact (which
    # uses the workflow token, not release write). Mirrors the
    # `publish` job's least-privilege override below.
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            lib_name: libelevator_ffi.so
          - os: windows-latest
            lib_name: elevator_ffi.dll
          - os: macos-15
            lib_name: libelevator_ffi.dylib
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.ffi-tag-name }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev libasound2-dev

      - name: Build elevator-ffi cdylib
        run: cargo build -p elevator-ffi --release

      - name: Stage cdylib
        env:
          LIB_NAME: ${{ matrix.lib_name }}
        run: |
          mkdir -p staged
          # No --target was passed to cargo build, so the cdylib is
          # always at the workspace-local target/release/. The
          # ffi-harness job uses the same path; matching it here
          # avoids Windows-path edge cases that the cargo-metadata
          # JSON parse would inherit (backslashes in target_directory).
          cp "target/release/$LIB_NAME" "staged/$LIB_NAME"

      - name: Upload cdylib artefact
        uses: actions/upload-artifact@v4
        with:
          name: gms-binary-${{ matrix.lib_name }}
          path: staged/
          retention-days: 1

  package-gms-bundle:
    needs: [release-please, package-gms-binaries]
    if: needs.release-please.outputs.ffi-release-created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.ffi-tag-name }}

      - name: Download all platform binaries
        uses: actions/download-artifact@v4
        with:
          path: pickup/
          pattern: gms-binary-*
          merge-multiple: true

      - name: Assemble bundle
        env:
          VERSION: ${{ needs.release-please.outputs.ffi-version }}
        run: |
          BUNDLE="elevator_ffi_gms2-${VERSION}"
          mkdir -p "$BUNDLE"
          # Copy the in-tree extension folder verbatim, then drop the
          # platform binaries into binaries/. The extension folder
          # already includes elevator_ffi.gml + elevator_ffi_generated.gml
          # + elevator_ffi.yy + README + the binaries/.gitkeep that
          # the release fills in here.
          cp -r examples/gms2-extension/* "$BUNDLE/"
          mkdir -p "$BUNDLE/extension/elevator_ffi/binaries"
          cp pickup/libelevator_ffi.so      "$BUNDLE/extension/elevator_ffi/binaries/"
          cp pickup/elevator_ffi.dll        "$BUNDLE/extension/elevator_ffi/binaries/"
          cp pickup/libelevator_ffi.dylib   "$BUNDLE/extension/elevator_ffi/binaries/"
          # License compliance: the dual MIT/Apache notice ships with
          # every binary distribution.
          cp LICENSE LICENSE-MIT LICENSE-APACHE "$BUNDLE/"
          # Drop the empty .gitkeep marker that's there only to make
          # the repo path real before release packaging populates it.
          rm -f "$BUNDLE/extension/elevator_ffi/binaries/.gitkeep"
          zip -r "$BUNDLE.zip" "$BUNDLE"

      - name: Upload bundle to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.ffi-tag-name }}
          VERSION: ${{ needs.release-please.outputs.ffi-version }}
        run: |
          # --clobber: a re-run after a partial failure (e.g. asset
          # uploaded but a later step failed) needs to overwrite the
          # previous attempt rather than refusing with "already
          # exists" and aborting the rerun.
          gh release upload "$TAG" "elevator_ffi_gms2-${VERSION}.zip" \
            --clobber \
            --repo "${GITHUB_REPOSITORY}"
