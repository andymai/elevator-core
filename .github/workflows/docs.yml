name: Docs

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - scripts/lint-docs.sh
      - .github/workflows/docs.yml
      - crates/elevator-wasm/**
      - crates/elevator-core/**
      - playground/**
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: latest
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      - name: Install mdbook-mermaid
        run: cargo install mdbook-mermaid --locked

      - name: Install wasm-bindgen-cli
        run: |
          WB_VERSION=$(cargo metadata --format-version 1 \
            | python3 -c "import sys,json; pkgs=json.load(sys.stdin)['packages']; print(next(p['version'] for p in pkgs if p['name']=='wasm-bindgen'))")
          cargo install "wasm-bindgen-cli@${WB_VERSION}" --locked

      - name: Lint docs
        run: scripts/lint-docs.sh --quick

      - name: Build book
        run: mdbook build docs

      - name: Build elevator-wasm
        run: scripts/build-wasm.sh

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: playground/pnpm-lock.yaml

      - name: Build playground
        working-directory: playground
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Stage playground into mdBook output
        run: |
          mkdir -p target/book/playground
          cp -r playground/dist/. target/book/playground/

      - name: Stage sitemap.xml at site root
        run: |
          # docs/static/* are SEO files (currently sitemap.xml) that
          # need to land at the gh-pages root, not under a book chapter
          # slug. Copying after `mdbook build` so they aren't treated as
          # book content. (No robots.txt: RFC 9309 requires it at the
          # origin root, which GitHub Pages owns for project sites —
          # crawl-control lives in <meta name="robots"> in the page head
          # instead, and the sitemap is submitted via Search Console.)
          cp -r docs/static/. target/book/

      # Publish to gh-pages branch (not the workflow Pages artifact) so the
      # nightly-bench dashboard at /bench/ — pushed by
      # benchmark-action/github-action-benchmark — can coexist on the same
      # branch. `keep_files: true` preserves /bench/ across docs deploys.
      #
      # NOTE: requires repo Settings → Pages → "Build and deployment: Deploy
      # from a branch / gh-pages / (root)". Without that, Pages will not
      # serve the published files.
      - uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: target/book
          keep_files: true
