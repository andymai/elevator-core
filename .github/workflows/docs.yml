name: Docs

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - scripts/lint-docs.sh
      - .github/workflows/docs.yml
      - crates/elevator-wasm/**
      - crates/elevator-core/**
      - playground/**
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: latest
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      - name: Install mdbook-mermaid
        run: cargo install mdbook-mermaid --locked

      - name: Install wasm-pack
        # Use the prebuilt binary so runners don't need libbz2-dev / openssl-dev.
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          # Pinned: a new wasm-pack release with breaking CLI changes could
          # otherwise silently break this job. Bump deliberately.
          version: "v0.14.0"

      - name: Lint docs
        run: scripts/lint-docs.sh --quick

      - name: Build book
        run: mdbook build docs

      - name: Build elevator-wasm
        # Populates playground/public/pkg/ so Vite serves the wasm at runtime.
        # --no-typescript: TS types live hand-written in playground/src/types.ts.
        run: |
          wasm-pack build crates/elevator-wasm \
            --target web \
            --out-dir ../../playground/public/pkg \
            --release \
            --no-typescript

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: playground/pnpm-lock.yaml

      - name: Build playground
        working-directory: playground
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Stage playground into mdBook output
        # mdBook emits to target/book. Drop the playground bundle under
        # /playground/ there so the deployed Pages site has both.
        #
        # wasm-pack emits a `.gitignore` containing `*` inside `public/pkg/`
        # so the source tree never tracks generated artifacts. Vite copies
        # publicDir verbatim, so that file rides into `dist/pkg/.gitignore`
        # and then into the staged tree. `peaceiris/actions-gh-pages` uses
        # `git add` under the hood, which honors the nested ignore and
        # silently drops every pkg/ file from the publish — the deploy
        # succeeds but the playground 404s on its wasm. Strip it here.
        run: |
          mkdir -p target/book/playground
          cp -r playground/dist/. target/book/playground/
          rm -f target/book/playground/pkg/.gitignore

      # Publish to gh-pages branch (not the workflow Pages artifact) so the
      # nightly-bench dashboard at /bench/ — pushed by
      # benchmark-action/github-action-benchmark — can coexist on the same
      # branch. `keep_files: true` preserves /bench/ across docs deploys.
      #
      # NOTE: requires repo Settings → Pages → "Build and deployment: Deploy
      # from a branch / gh-pages / (root)". Without that, Pages will not
      # serve the published files.
      - uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: target/book
          keep_files: true
