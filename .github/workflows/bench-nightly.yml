name: Benchmarks (nightly)

on:
  schedule:
    # 08:00 UTC daily
    - cron: '0 8 * * *'
  workflow_dispatch:

# Don't run on forks — the comparison baseline lives on this repo.
jobs:
  bench:
    if: github.repository == 'andymai/elevator-core'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Serialize gh-pages pushes against `docs.yml` (which uses the same
    # group). Otherwise a docs deploy and a manually-triggered bench run
    # can race and the second `git push` is rejected as non-fast-forward.
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      # `contents: write` is needed to push the time-series dashboard data
      # to gh-pages. `issues: write` keeps the existing regression-issue
      # creation behaviour working.
      contents: write
      issues: write
    env:
      CARGO_TERM_COLOR: always
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: bench-criterion
          cache-targets: true

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev libasound2-dev libwayland-dev libxkbcommon-dev libvulkan-dev

      # Restore the Criterion baseline so this run compares against it.
      # The cache key is suffixed with `github.sha`, so re-running the
      # *same* commit always restores the *first* measurement of that
      # commit (the save step below is gated on `cache-hit != 'true'`,
      # so the per-SHA baseline is locked once written). This bounds
      # drift to single-run variance instead of compounding it across
      # nights — under the previous `run_id`-keyed scheme each nightly
      # save overwrote the baseline with its own noisy output, which
      # then became tomorrow's comparison floor.
      #
      # When a new commit lands the exact-key restore misses; the
      # `restore-keys` prefix-fallback then pulls the most recent
      # SHA's baseline so the new commit is compared against the prior
      # known-good measurement. The save step writes a fresh entry
      # under the new SHA, freezing it for subsequent nightlies.
      - name: Restore previous criterion baseline
        id: restore-baseline
        uses: actions/cache/restore@v4
        with:
          path: target/criterion
          key: criterion-baseline-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            criterion-baseline-${{ github.ref_name }}-

      - name: Run benchmarks
        id: bench
        run: |
          set -o pipefail
          cargo bench -p elevator-core --bench sim_bench         -- --save-baseline nightly 2>&1 | tee -a bench-output.log
          cargo bench -p elevator-core --bench scaling_bench     -- --save-baseline nightly 2>&1 | tee -a bench-output.log
          cargo bench -p elevator-core --bench dispatch_bench    -- --save-baseline nightly 2>&1 | tee -a bench-output.log
          cargo bench -p elevator-core --bench multi_line_bench  -- --save-baseline nightly 2>&1 | tee -a bench-output.log
          cargo bench -p elevator-core --bench query_bench       -- --save-baseline nightly 2>&1 | tee -a bench-output.log

      # Criterion's "Performance has regressed." line fires on any
      # statistically significant change, irrespective of magnitude. On a
      # shared CI runner that produces false positives from sub-percent
      # drift and from micro-benches whose measurements are dominated by
      # timer jitter. The filter below keeps only regressions whose median
      # change exceeds MIN_CHANGE_PCT, which is the signal we actually want
      # to page on.
      - name: Detect regressions
        id: detect
        env:
          MIN_CHANGE_PCT: '5.0'
        run: |
          python3 .github/scripts/filter-bench-regressions.py \
            "$GITHUB_OUTPUT" "$MIN_CHANGE_PCT" bench-output.log

      - name: Upload bench output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: criterion-output-${{ github.run_id }}
          path: |
            target/criterion
            bench-output.log
          retention-days: 30

      # Only save when the exact-key restore missed — i.e. this is the
      # first nightly to bench this SHA. Skipping on exact-match keeps
      # the per-SHA baseline frozen at its first measurement, which is
      # what stops the noise compounding loop.
      - name: Save new criterion baseline
        if: steps.restore-baseline.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: target/criterion
          key: criterion-baseline-${{ github.ref_name }}-${{ github.sha }}

      # Open the regression issue *before* publishing to gh-pages so a
      # `git push` failure in the publish step (rate-limit, non-fast-forward,
      # auth hiccup) does not silently suppress the alert via the implicit
      # `success()` gate on the issue step's `if:` condition.
      - name: Open issue on regression
        if: steps.detect.outputs.regressed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = [
              'Nightly benchmark run flagged a Criterion regression.',
              '',
              '```',
              fs.readFileSync('regressions.txt', 'utf8').slice(0, 4000),
              '```',
              '',
              `Full artifact: criterion-output-${{ github.run_id }}`,
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Bench regression on ${new Date().toISOString().slice(0,10)}`,
              body,
              labels: ['perf', 'automated'],
            });

      # Publish a time-series dashboard at andymai.github.io/elevator-core/bench/.
      # Parses Criterion's output from `bench-output.log` (already captured by
      # `tee -a` above) and pushes per-bench history to gh-pages/bench/. The
      # docs.yml workflow uses `keep_files: true` to preserve this directory
      # across docs deploys.
      - name: Publish bench history
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'cargo'
          output-file-path: bench-output.log
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: bench
          # Non-blocking — the existing `Open issue on regression` step
          # already alerts on Criterion's own regression detection.
          alert-threshold: '110%'
          fail-on-alert: false
