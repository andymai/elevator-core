name: Benchmarks (nightly)

on:
  schedule:
    # 08:00 UTC daily
    - cron: '0 8 * * *'
  workflow_dispatch:

# Don't run on forks — the comparison baseline lives on this repo.
jobs:
  bench:
    if: github.repository == 'andymai/elevator-core'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Serialize gh-pages pushes against `docs.yml` (which uses the same
    # group). Otherwise a docs deploy and a manually-triggered bench run
    # can race and the second `git push` is rejected as non-fast-forward.
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      # `contents: write` is needed to push the time-series dashboard data
      # to gh-pages. `issues: write` keeps the existing regression-issue
      # creation behaviour working.
      contents: write
      issues: write
    env:
      CARGO_TERM_COLOR: always
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      # Pinned, NOT @stable. The criterion baseline is a frozen per-SHA
      # measurement; comparing it against a run built by a newer stable
      # rustc conflates compiler codegen drift with code changes, which
      # is exactly how an unpinned @stable produced ~2 weeks of phantom
      # +13–20% regressions (issue #884). Bump this deliberately when
      # adopting a new toolchain — the history auto-re-establishes
      # because the cache key below is keyed on `rustc --version`.
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: bench-criterion
          cache-targets: true

      # Capture the exact compiler version into the env so the measurement
      # history cache key can include it. Any toolchain change (the pin
      # above, or even a patch release) then lands on a fresh key and the
      # history rebuilds from scratch instead of reporting compiler drift
      # as a code regression — absolute timings are compiler-dependent, so
      # a history must never span toolchains.
      # Whitelist-sanitize to chars valid in a GitHub Actions cache key
      # (commas in particular are rejected). A future rustc format change
      # — channel suffix, date-delimiter tweak — can't then corrupt the key.
      - name: Record rustc version for the history cache key
        run: echo "RUSTC_VER=$(rustc --version | sed 's/[^a-zA-Z0-9._-]/_/g')" >> "$GITHUB_ENV"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev libasound2-dev libwayland-dev libxkbcommon-dev libvulkan-dev

      # Restore the rolling per-bench measurement history. The detect step
      # compares tonight against the *median* of the last N nightlies rather
      # than against a single frozen prior measurement.
      #
      # This replaces the per-SHA criterion baseline lock (#734). That lock
      # froze the comparison point at the first nightly to measure a commit,
      # which made the two-day persistence gate structurally unable to do its
      # job: a real regression showed up for exactly one night (the nightly
      # after the new SHA landed), and that same night re-locked the baseline,
      # so every subsequent night compared the SHA against itself. Only noise
      # recurs under that scheme, so only noise was ever confirmed — see
      # #923/#924.
      #
      # Keyed by `run_id` with a prefix fallback, giving rolling-daily
      # semantics: each night picks up the most recent prior history. The key
      # carries `RUSTC_VER` so a toolchain bump starts a fresh history instead
      # of charging the compiler's codegen drift to the code as a phantom
      # regression (issue #884) — absolute timings are compiler-dependent, so
      # history must not span toolchains.
      - name: Restore bench median history
        uses: actions/cache/restore@v4
        with:
          path: bench-history.json
          key: bench-history-${{ github.ref_name }}-${{ env.RUSTC_VER }}-${{ github.run_id }}
          restore-keys: |
            bench-history-${{ github.ref_name }}-${{ env.RUSTC_VER }}-

      # Restore the previous nightly's regression-name list so the detect
      # step can gate issue-open on two-day persistence. Keyed by
      # `github.run_id` with a prefix fallback for rolling-daily semantics,
      # matching the history cache above: when no new commit lands for
      # several nights (weekends, quiet windows), today still compares
      # against *yesterday's* list.
      #
      # Exact-key restore therefore always misses (this run's run_id is
      # unique); the prefix-fallback restore-keys pull the most recent
      # prior run's list. When even the prefix fallback misses, the detect
      # step falls back to single-run behaviour for that one day.
      - name: Restore previous regression list
        id: restore-regressions
        uses: actions/cache/restore@v4
        with:
          path: regressions-current.txt
          key: criterion-regressions-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            criterion-regressions-${{ github.ref_name }}-

      - name: Stash previous regression list
        run: |
          if [ -f regressions-current.txt ]; then
            mv regressions-current.txt regressions-previous.txt
          fi

      - name: Run benchmarks
        id: bench
        run: |
          set -o pipefail
          # Pre-compile all benches so cargo's "Updating/Downloading/Compiling"
          # output doesn't land in bench-output.log (parsed by the publish step).
          # On a cold build it otherwise pollutes the log and github-action-
          # benchmark reports "No benchmark result was found".
          cargo bench -p elevator-core --no-run
          cargo bench -p elevator-core --bench sim_bench         -- --save-baseline nightly 2>&1 | tee -a bench-output.log
          cargo bench -p elevator-core --bench scaling_bench     -- --save-baseline nightly 2>&1 | tee -a bench-output.log
          cargo bench -p elevator-core --bench dispatch_bench    -- --save-baseline nightly 2>&1 | tee -a bench-output.log
          cargo bench -p elevator-core --bench multi_line_bench  -- --save-baseline nightly 2>&1 | tee -a bench-output.log
          cargo bench -p elevator-core --bench query_bench       -- --save-baseline nightly 2>&1 | tee -a bench-output.log
          # Runner-speed calibration — no elevator-core code. The detect step
          # measures it against its own rolling median and divides that factor
          # back out of every real bench, cancelling the shared `ubuntu-latest`
          # speed variance that otherwise reads as a uniform across-the-board
          # regression (#907/#908/#913/#914/#916).
          cargo bench -p elevator-core --bench calibration_bench -- --save-baseline nightly 2>&1 | tee -a bench-output.log

      # Compare tonight's per-bench mean (read from Criterion's
      # estimates.json, not its `change:` lines) against the median of the
      # last N nightlies. A bench is reported when it exceeds that median by
      # more than MIN_CHANGE_PCT after the calibration bench's runner-speed
      # factor is divided out (#907/#908/#913/#914/#916), *and* it also
      # appeared on the previous nightly's list (the recurrence-as-signal
      # heuristic from #734).
      #
      # The median baseline is what makes that recurrence gate meaningful: it
      # stays put night to night, so a genuine regression keeps clearing the
      # threshold until enough post-regression nights accumulate to move the
      # median. Under the old per-SHA freeze the baseline re-locked the same
      # night the regression appeared, so the gate could only ever confirm
      # noise (#923/#924).
      #
      # MIN_CHANGE_PCT stays at 5.0: calibration removes the uniform
      # runner-speed component, so the residual this gate sees is genuine
      # per-bench spread. Nudge to ~7-8 if residual noise still trips.
      - name: Detect regressions
        id: detect
        env:
          MIN_CHANGE_PCT: '5.0'
        run: |
          python3 .github/scripts/detect-bench-regressions.py \
            "$GITHUB_OUTPUT" "$MIN_CHANGE_PCT" target/criterion \
            bench-history.json regressions-previous.txt

      - name: Upload bench output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: criterion-output-${{ github.run_id }}
          path: |
            target/criterion
            bench-output.log
          retention-days: 30

      # Persist the history with tonight's sample appended (the detect step
      # rewrote the file in place, after doing its comparison, so tonight
      # never influenced the median it was measured against).
      #
      # Scheduled runs only, for the same reason the regression list is
      # guarded below: a `workflow_dispatch` preview must not inject a
      # sample into the rolling reference.
      - name: Save bench median history
        if: github.event_name == 'schedule'
        uses: actions/cache/save@v4
        with:
          path: bench-history.json
          key: bench-history-${{ github.ref_name }}-${{ env.RUSTC_VER }}-${{ github.run_id }}

      # Save today's regression-name list under the per-run-id key so
      # tomorrow's prefix-fallback restore picks it up. Only the
      # scheduled nightly writes — `workflow_dispatch` runs read the
      # most recent nightly's list (useful as a "would my change trip
      # the gate?" preview) but don't pollute the rolling reference.
      # Without this guard, two manual dispatches on the same day would
      # cross-confirm via prefix-fallback within minutes, firing the
      # `confirmed on two consecutive nightlies` issue body without
      # crossing a night boundary.
      - name: Save current regression list
        if: github.event_name == 'schedule'
        uses: actions/cache/save@v4
        with:
          path: regressions-current.txt
          key: criterion-regressions-${{ github.ref_name }}-${{ github.run_id }}

      # Open the regression issue *before* publishing to gh-pages so a
      # `git push` failure in the publish step (rate-limit, non-fast-forward,
      # auth hiccup) does not silently suppress the alert via the implicit
      # `success()` gate on the issue step's `if:` condition.
      #
      # Scheduled runs only, matching the cache-write guards. A dispatch run
      # restores the last nightly's regression list and compares against the
      # same history, so it would re-confirm a live regression and file a
      # duplicate issue without a night boundary having passed. Dispatch
      # stays a read-only preview: the finding is still printed in the step
      # log and the `regressed` output is still set.
      - name: Open issue on regression
        if: steps.detect.outputs.regressed == 'true' && github.event_name == 'schedule'
        env:
          GATE: ${{ steps.detect.outputs.gate }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const gate = process.env.GATE || 'unknown';
            const header = gate === 'two-day'
              ? 'Nightly benchmark run flagged a regression against the rolling median of recent nightlies (confirmed on two consecutive nightlies).'
              : 'Nightly benchmark run flagged a regression against the rolling median of recent nightlies. ' +
                'Single-run gate (no previous-nightly list cached yet).';
            const body = [
              header,
              '',
              '```',
              fs.readFileSync('regressions.txt', 'utf8').slice(0, 4000),
              '```',
              '',
              `Full artifact: criterion-output-${{ github.run_id }}`,
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Bench regression on ${new Date().toISOString().slice(0,10)}`,
              body,
              labels: ['perf', 'automated'],
            });

      # Publish a time-series dashboard at andymai.github.io/elevator-core/bench/.
      # Parses Criterion's output from `bench-output.log` (already captured by
      # `tee -a` above) and pushes per-bench history to gh-pages/bench/. The
      # docs.yml workflow uses `keep_files: true` to preserve this directory
      # across docs deploys.
      # github-action-benchmark's `cargo` parser wants libtest "bencher"
      # lines, which Criterion never emits. Generate them from Criterion's
      # JSON estimates so bench-output.log stays in its native format for
      # the regression detector above.
      - name: Convert Criterion results to bencher format
        run: python3 .github/scripts/criterion-to-bencher.py > bench-bencher.txt

      - name: Publish bench history
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'cargo'
          output-file-path: bench-bencher.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: bench
          # Non-blocking — the existing `Open issue on regression` step
          # already alerts on Criterion's own regression detection.
          alert-threshold: '110%'
          fail-on-alert: false
