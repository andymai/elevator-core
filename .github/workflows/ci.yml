name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Default to read-only on the workflow token; jobs can opt up if needed.
permissions:
  contents: read

jobs:
  check:
    name: Check
    # Skip on release-please PRs (machine-generated version bumps —
    # no code changes to test). Branch-protection treats a SKIPPED
    # required check as success, so this is safe to gate on. The
    # `push: main` trigger is unaffected; we still validate the
    # post-merge state on main.
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.user.login != 'release-kun[bot]' ||
      !startsWith(github.event.pull_request.title, 'chore(main): release')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev libasound2-dev libwayland-dev libxkbcommon-dev libvulkan-dev

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test workspace
        run: cargo test --workspace --all-features

      - name: Build workspace
        run: cargo build --workspace

      - name: Doc check
        run: cargo doc --no-deps --workspace --all-features
        env:
          RUSTDOCFLAGS: -D warnings

      - uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: latest

      - name: Install mdbook-mermaid
        run: cargo install mdbook-mermaid --locked

      - name: Lint docs
        run: scripts/lint-docs.sh

      - name: Check binding coverage
        run: scripts/check-bindings.sh

  supply-chain:
    name: Supply chain (cargo-deny)
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.user.login != 'release-kun[bot]' ||
      !startsWith(github.event.pull_request.title, 'chore(main): release')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arg: --workspace

  ffi-harness:
    name: FFI smoke test (${{ matrix.os }})
    # Runs on every push and every PR. The push-only gate that lived
    # here previously let two ABI bumps (#499 v3, #504 v4) land
    # without updating the C# harness, leaving main red for hours
    # before #514 caught it. The cost is real (3 cross-platform
    # cdylib builds + dotnet build) but cheaper than reverting a
    # broken main; rust-cache amortizes the cdylib build to ~30 s
    # warm. Skip on release-please PRs (machine-generated version
    # bumps don't change the FFI surface).
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.user.login != 'release-kun[bot]' ||
      !startsWith(github.event.pull_request.title, 'chore(main): release')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            lib_name: libelevator_ffi.so
          - os: windows-latest
            rid: win-x64
            lib_name: elevator_ffi.dll
          # Pin to macos-15 rather than macos-latest: the alias currently
          # resolves to Apple Silicon (matching osx-arm64), but if GitHub
          # ever remaps macos-latest to an x86-64 runner the dylib would
          # land in the wrong runtime-id directory and fail with a
          # confusing DllNotFoundException. Explicit = self-documenting.
          - os: macos-15
            rid: osx-arm64
            lib_name: libelevator_ffi.dylib
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev libasound2-dev

      - name: Build elevator-ffi cdylib
        run: cargo build -p elevator-ffi --release

      - name: Verify generated header is up to date
        if: runner.os == 'Linux'
        run: |
          cargo build -p elevator-ffi
          if ! git diff --exit-code crates/elevator-ffi/include/elevator_ffi.h; then
            echo "::error::elevator_ffi.h is out of date — run 'cargo build -p elevator-ffi' and commit the result."
            exit 1
          fi

      - name: Stage cdylib for harness
        env:
          RID: ${{ matrix.rid }}
          LIB_NAME: ${{ matrix.lib_name }}
        run: |
          mkdir -p "examples/csharp-harness/runtimes/$RID/native"
          cp "target/release/$LIB_NAME" "examples/csharp-harness/runtimes/$RID/native/"

      - name: Build C# harness
        working-directory: examples/csharp-harness
        run: dotnet build -c Release

      - name: Run C# harness smoke test
        working-directory: examples/csharp-harness
        run: dotnet run -c Release --no-build -- ../../assets/config/default.ron

  wasm-gate:
    name: wasm32 gate (elevator-core)
    # Enforces the "core stays engine-agnostic" invariant: if anyone adds a
    # non-wasm-safe dependency to elevator-core (rayon, tokio, mio, etc.) or
    # pulls in a native-only system API, this job fails before the playground
    # deploy ever sees the regression.
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.user.login != 'release-kun[bot]' ||
      !startsWith(github.event.pull_request.title, 'chore(main): release')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      # Core is only required to compile to wasm32 in its pure form (no
      # browser runtime deps). The `traffic` feature pulls `rand` →
      # `getrandom`, whose `wasm_js` backend is deliberately provided by
      # `elevator-wasm` — not core — to keep core engine-agnostic. So we
      # verify core is pure-wasm with no features and with each non-default
      # feature in isolation; the `elevator-wasm` check below proves the
      # full stack (core + traffic + shim) compiles end-to-end.
      - name: Check core (no default features, wasm32)
        run: cargo check -p elevator-core --target wasm32-unknown-unknown --no-default-features

      - name: Check core (energy feature, wasm32)
        run: cargo check -p elevator-core --target wasm32-unknown-unknown --no-default-features --features energy

      - name: Check elevator-wasm bindgen crate (full stack)
        # Exercises elevator-core with default features (incl. `traffic`)
        # alongside the `wasm_js` getrandom shim — the only target+feature
        # combination where core with `traffic` is expected to reach wasm.
        run: cargo check -p elevator-wasm --target wasm32-unknown-unknown

  msrv:
    name: MSRV (elevator-core)
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.user.login != 'release-kun[bot]' ||
      !startsWith(github.event.pull_request.title, 'chore(main): release')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pinned to the rust-version declared in the workspace Cargo.toml.
      # Only elevator-core commits to an MSRV; elevator-bevy depends on a
      # newer toolchain via bevy and is intentionally excluded.
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2

      - name: Build elevator-core on MSRV
        run: cargo build -p elevator-core --all-features
