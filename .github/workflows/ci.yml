name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Default to read-only on the workflow token; jobs can opt up if needed.
permissions:
  contents: read

jobs:
  check:
    name: Check
    # Skip on release-please PRs (machine-generated version bumps —
    # no code changes to test). Branch-protection treats a SKIPPED
    # required check as success, so this is safe to gate on. The
    # `push: main` trigger is unaffected; we still validate the
    # post-merge state on main.
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.user.login != 'release-kun[bot]' ||
      !startsWith(github.event.pull_request.title, 'chore(main): release')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev libasound2-dev libwayland-dev libxkbcommon-dev libvulkan-dev

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test workspace
        run: cargo test --workspace

      - name: Build workspace
        run: cargo build --workspace

      - name: Doc check
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

      - uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: latest

      - name: Install mdbook-mermaid
        run: cargo install mdbook-mermaid --locked

      - name: Lint docs
        run: scripts/lint-docs.sh

  supply-chain:
    name: Supply chain (cargo-deny)
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.user.login != 'release-kun[bot]' ||
      !startsWith(github.event.pull_request.title, 'chore(main): release')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arg: --workspace

  ffi-harness:
    name: FFI smoke test (${{ matrix.os }})
    # Cross-platform FFI builds are slow — only run after merge to main.
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            lib_name: libelevator_ffi.so
          - os: windows-latest
            rid: win-x64
            lib_name: elevator_ffi.dll
          # Pin to macos-15 rather than macos-latest: the alias currently
          # resolves to Apple Silicon (matching osx-arm64), but if GitHub
          # ever remaps macos-latest to an x86-64 runner the dylib would
          # land in the wrong runtime-id directory and fail with a
          # confusing DllNotFoundException. Explicit = self-documenting.
          - os: macos-15
            rid: osx-arm64
            lib_name: libelevator_ffi.dylib
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev libasound2-dev

      - name: Build elevator-ffi cdylib
        run: cargo build -p elevator-ffi --release

      - name: Verify generated header is up to date
        if: runner.os == 'Linux'
        run: |
          cargo build -p elevator-ffi
          if ! git diff --exit-code crates/elevator-ffi/include/elevator_ffi.h; then
            echo "::error::elevator_ffi.h is out of date — run 'cargo build -p elevator-ffi' and commit the result."
            exit 1
          fi

      - name: Stage cdylib for harness
        env:
          RID: ${{ matrix.rid }}
          LIB_NAME: ${{ matrix.lib_name }}
        run: |
          mkdir -p "examples/csharp-harness/runtimes/$RID/native"
          cp "target/release/$LIB_NAME" "examples/csharp-harness/runtimes/$RID/native/"

      - name: Build C# harness
        working-directory: examples/csharp-harness
        run: dotnet build -c Release

      - name: Run C# harness smoke test
        working-directory: examples/csharp-harness
        run: dotnet run -c Release --no-build -- ../../assets/config/default.ron

  msrv:
    name: MSRV (elevator-core)
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.user.login != 'release-kun[bot]' ||
      !startsWith(github.event.pull_request.title, 'chore(main): release')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pinned to the rust-version declared in the workspace Cargo.toml.
      # Only elevator-core commits to an MSRV; elevator-bevy depends on a
      # newer toolchain via bevy and is intentionally excluded.
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2

      - name: Build elevator-core on MSRV
        run: cargo build -p elevator-core --all-features
